bundle:
  name: akzo_l200_capabilities

sync:
  exclude:
    - ".databricks"
    - ".claude"
    - ".venv"
    - "node_modules"
    - "load-test-runs"
    # Never ship uv.lock to Apps: it can pin wheels to an internal proxy host
    # (e.g. pypi-proxy.dev.databricks.com) that the Apps build network can't
    # reach, which fails the build with "error installing packages". With
    # requirements.txt present the builder uses pip + the platform mirror.
    - "uv.lock"

# Override per workspace at deploy time, e.g.:
#   databricks bundle deploy --var="catalog=my_catalog" --var="warehouse_id=abc123"
# Nothing here is tied to a specific workspace, user, profile, or warehouse.
variables:
  catalog:
    description: Unity Catalog holding the akzo_* schemas and UC-function tools.
    default: ""
  tools_schema:
    description: Schema holding the UC-function tools exposed to the agent.
    default: "akzo_tools"
  llm_endpoint:
    description: >-
      Serving endpoint / model the agent uses. REQUIRED — no default; pass it at
      deploy, e.g. --var="llm_endpoint=databricks-claude-sonnet-4-5".
    default: ""
  experiment_id:
    description: MLflow experiment id for tracing (set by quickstart).
    default: ""
  lakebase_instance:
    description: Lakebase instance name for memory + the Action Plane.
    default: ""

resources:
  apps:
    akzo_capabilities_agent:
      name: "agent-akzo-capabilities"
      description: "AkzoNobel L200 capabilities agent (OpenAI Agents SDK + UC tools + Action Plane)"
      source_code_path: ./
      config:
        # Backend-only ASGI entrypoint. NOT `uv run start-app`: that path does a
        # runtime `uv sync` (re-resolving deps against a uv.lock) AND a runtime
        # git-clone + `npm install/build` of a chat UI — both fail on Databricks
        # Apps (internal proxy / blocked public registries / no egress). All
        # startup work (agent registration, MLflow, Action Plane mount, Lakebase
        # tables) runs at import time in start_server.py, so uvicorn is enough.
        command: ["uvicorn", "agent_server.start_server:app", "--host", "0.0.0.0", "--port", "8000"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value: ${var.experiment_id}
          - name: AGENT_NAME
            value: "akzo-capabilities-agent"
          - name: LLM_ENDPOINT
            value: ${var.llm_endpoint}
          - name: AKZO_CATALOG
            value: ${var.catalog}
          - name: AKZO_TOOLS_SCHEMA
            value: ${var.tools_schema}
          - name: LAKEBASE_AGENT_MEMORY_SCHEMA
            value: "agent_openai_memory"
          - name: LAKEBASE_INSTANCE_NAME
            value: ${var.lakebase_instance}
          - name: LAKEBASE_INSTANCE
            value: ${var.lakebase_instance}
          - name: LAKEBASE_SCHEMA
            value: "akzo_actions"
          - name: PGDATABASE
            value: "databricks_postgres"
          - name: PGPORT
            value: "5432"
          - name: ENABLE_ACTIONS_API
            value: "false"

      # Resources this app has access to. Add a Genie space / UC-function MCP
      # server grant here when you wire tools — see the add-tools skill.
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: ${var.experiment_id}
            permission: 'CAN_MANAGE'
        # Bind the Lakebase instance so Databricks Apps injects PGHOST/PGUSER/PGPASSWORD/
        # PGDATABASE for the app SP and registers it as a Postgres role. Required for both
        # the agent's Lakebase memory + Action Plane tables AND the chat UI's startup
        # migration (which reads PGHOST/PGDATABASE). Without this the app crashes at boot
        # with "password authentication failed" / "PGHOST and PGDATABASE must be set".
        - name: 'database'
          database:
            database_name: "databricks_postgres"
            instance_name: ${var.lakebase_instance}
            permission: 'CAN_CONNECT_AND_CREATE'
        # Scope the app SP token to query the model the agent calls. Without this the SP's
        # SDK/model calls return a non-JSON error the SDK reports as "unable to parse
        # response" instead of running.
        - name: 'serving-endpoint'
          serving_endpoint:
            name: ${var.llm_endpoint}
            permission: CAN_QUERY

targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    resources:
      apps:
        akzo_capabilities_agent:
          name: agent-akzo-capabilities

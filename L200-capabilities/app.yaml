# Backend-only ASGI entrypoint. NOT `uv run start-app`: that runtime path does a
# `uv sync` and a git-clone + npm build of a chat UI, both of which fail on
# Databricks Apps (internal proxy / blocked registries / no egress). Startup work
# runs at import time in start_server.py, so uvicorn alone is sufficient.
command: ["uvicorn", "agent_server.start_server:app", "--host", "0.0.0.0", "--port", "8000"]

env:
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MLFLOW_REGISTRY_URI
    value: "databricks-uc"
  - name: API_PROXY
    value: "http://localhost:8000/invocations"
  - name: CHAT_APP_PORT
    value: "3000"
  - name: CHAT_PROXY_TIMEOUT_SECONDS
    value: "300"
  - name: MLFLOW_EXPERIMENT_ID
    valueFrom: "experiment"
  # --- Agent config (override per workspace; do not hardcode a workspace) ---
  - name: AGENT_NAME
    value: "akzo-capabilities-agent"
  # LLM_ENDPOINT is REQUIRED and has no code default. Uncomment and set it to a
  # serving endpoint you are entitled to before deploying:
  #   - name: LLM_ENDPOINT
  #     value: "databricks-claude-sonnet-4-5"
  # AKZO_CATALOG / AKZO_TOOLS_SCHEMA / AKZO_GENIE_SPACE_ID are set per lab.
  - name: AKZO_TOOLS_SCHEMA
    value: "akzo_tools"
  # --- Lakebase short-term memory ---
  - name: LAKEBASE_AGENT_MEMORY_SCHEMA
    value: "agent_openai_memory"
  - name: PGDATABASE
    value: "databricks_postgres"
  - name: PGPORT
    value: "5432"
  # --- Action Plane (off by default; enable once Lakebase actions schema exists) ---
  - name: ENABLE_ACTIONS_API
    value: "false"
  - name: LAKEBASE_SCHEMA
    value: "akzo_actions"

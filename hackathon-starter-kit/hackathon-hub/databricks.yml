bundle:
  name: akzo-hackathon-hub

resources:
  apps:
    app:
      name: "akzo-hackathon-hub"
      description: "A Databricks App powered by AppKit"
      source_code_path: ./
      # Uncomment to enable on behalf of user API scopes. Available scopes: sql, dashboards.genie, files.files, serving.serving-endpoints
      # user_api_scopes:
      #   - sql

targets:
  default:
    default: true
    workspace:
      # Set to your workspace URL, e.g. https://<your-workspace>.cloud.databricks.com
      # On Vocareum, use the workspace URL assigned to your lab.
      host: ${DATABRICKS_HOST}

# Databricks Asset Bundle for the L300 Multi-domain Supervisor.
# Fill in the bundle variables for your lab (warehouse, Genie spaces, Lakebase, experiment).
# Nothing is hardcoded to a workspace; the values below are bundle variables you set at deploy.
bundle:
  name: akzo_multidomain_supervisor

variables:
  catalog:
    description: >-
      Unity Catalog holding the coatings data (akzo_finance / akzo_scm / akzo_commercial
      schemas). REQUIRED for Databricks Apps: the app runtime has no Spark session, so
      current_catalog() cannot resolve there — set it with `--var catalog=<your_catalog>`.
    default: ""
  llm_endpoint:
    description: Chat model serving endpoint you are entitled to (REQUIRED — no default).
    default: ""
  warehouse_id:
    description: Serverless SQL warehouse id for the governed text2sql fallback legs.
    default: ""
  finance_space_id:
    description: Genie space id for the Finance domain.
    default: ""
  scm_space_id:
    description: Genie space id for the Supply Chain domain.
    default: ""
  commercial_space_id:
    description: Genie space id for the Commercial domain.
    default: ""
  lakebase_instance:
    description: Lakebase (managed Postgres) instance name for the audit + Action Plane tables.
    default: ""
  experiment_id:
    description: MLflow experiment id for traces + models.
    default: ""

resources:
  apps:
    akzo_multidomain_supervisor:
      name: "akzo-multidomain-supervisor"
      description: "AkzoNobel Multi-domain Supervisor — Finance / SCM / Commercial Genie + full Action Plane"
      source_code_path: ./
      # Scopes the app can request on the calling user's behalf (OBO). Without `sql`
      # and `dashboards.genie` the forwarded user token can't call the SQL Statement
      # Execution API or Genie, and the data legs fail with
      # "403 Forbidden — Invalid scope, required scopes: sql". The user must also
      # hold the underlying warehouse / Genie / table grants for OBO to resolve.
      user_api_scopes:
        - "sql"
        - "dashboards.genie"
        - "serving.serving-endpoints"
      config:
        command: ["uvicorn", "agent_server.main:app", "--host", "0.0.0.0", "--port", "8000"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          # Catalog + schemas. AKZO_CATALOG MUST be supplied here: the Apps runtime has no
          # Spark, so current_catalog() does not resolve and get_catalog() would fail fast.
          - name: AKZO_CATALOG
            value: ${var.catalog}
          - name: AKZO_FINANCE_SCHEMA
            value: "akzo_finance"
          - name: AKZO_SCM_SCHEMA
            value: "akzo_scm"
          - name: AKZO_COMMERCIAL_SCHEMA
            value: "akzo_commercial"
          - name: LLM_ENDPOINT
            value: ${var.llm_endpoint}
          - name: DATABRICKS_WAREHOUSE_ID
            value: ${var.warehouse_id}
          # Genie space ids are intentionally omitted here: when unset the supervisor
          # routes domain legs through the governed SQL (text2sql) fallback. Databricks
          # Apps rejects an env entry whose value resolves to empty ("must specify
          # value or valueFrom"), so only add these back with REAL space ids (via
          # --var or app resources) in a workspace that has Genie spaces provisioned.
          - name: LAKEBASE_INSTANCE
            value: ${var.lakebase_instance}
          - name: LAKEBASE_SCHEMA
            value: "akzo"
          - name: AKZO_HTTP_CONNECTION
            value: "akzo_external_systems"
          - name: MLFLOW_EXPERIMENT_ID
            value: ${var.experiment_id}

      # App resources scope the app service principal's OAuth token. Without declaring the
      # serving endpoint and SQL warehouse here, the SP token cannot call the model-query or
      # SQL statement APIs and the SDK surfaces it as "unable to parse response" (a non-JSON
      # error the typed parser can't read), not a clean 403. With them declared, the read
      # legs (text2sql ai_query) and the model calls run under a properly-scoped SP token.
      resources:
        - name: 'serving-endpoint'
          serving_endpoint:
            name: ${var.llm_endpoint}
            permission: CAN_QUERY
        - name: 'sql-warehouse'
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/akzo_multidomain_supervisor/${bundle.target}
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/akzo_multidomain_supervisor/${bundle.target}
